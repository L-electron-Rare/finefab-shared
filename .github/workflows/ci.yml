name: CI
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,gen]"
      - name: Validate schemas and generated types
        run: python scripts/generate_types.py
      - name: Run tests when present
        run: |
          if [ -d tests ]; then
            pytest tests/ -v
          else
            echo "No tests directory detected, skipping pytest"
          fi
